<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--선택자는 id선택자 태그(h1,input,div)선택자 , 클래스(class) 선택자-->
    <style>
        input{
            background-color: rgb(0, 255, 247);
            width: 50%;
            font-size: 50px;
            image-rendering: auto;
        }
        .mydiv{
            border: 5px solid rgb(255, 0, 0);
            padding: 10px; /* 안쪽여백 */
        }
        button{
            color: rgb(255, 255, 255);
            background-color: rgb(45, 45, 45);
            padding: 2rem;
            margin: 1rem;
            border: none;
            cursor: pointer;
            
        }
        button:hover{
            background-color: rgb(114, 114, 114);
        }
    </style>
</head>
<body>
    <div class="mydiv">
        <label for="aa">id : </label>
        <input type="text" name="" id="aa">
    </div>
    <P></P>
    <div class="mydiv">
        <label for="bb">pw : </label>
        <input type="password" name="" id="bb">
    </div>

    <button>로그인</button>
</body>
</html>
