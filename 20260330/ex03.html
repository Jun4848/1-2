<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <div>
        <h1>구구단</h1>
        <input type="text" id="gugudan">
        <button id = "check" >구구단</button>
        <div id="print"></div>
    </div>
</body>
</html>
<script>
    document.getElementById('check').onclick = function(){
        const gugudan = document.getElementById('gugudan').value;// input태그 안에 있는 value 가져오기
        const div = document.getElementById("print");//div 태그 가져오기
        let result = "";
        for (let i = 1; i <= 9; i++){
            result = result + ` ${gugudan} * ${i} = ${gugudan * i} `; 
        }
        div.textContent = result; 
    }
    
</script>
